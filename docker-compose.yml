version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    environment:
      - AI_SERVER=https://desktop-75bjpd-lab4090.tail6dd0ea.ts.net:8443
      - PORT=3000
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    ports:
      - "8080:8080"
    environment:
      - AI_SERVER_URL=https://desktop-75bjpd-lab4090.tail6dd0ea.ts.net:8443
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/geo_db
      - SPRING_DATASOURCE_USERNAME=geo_admin
      - SPRING_DATASOURCE_PASSWORD=geo_password
      - SPRING_DATASOURCE_DRIVER=org.postgresql.Driver
      - SPRING_JPA_DATABASE_PLATFORM=org.hibernate.dialect.PostgreSQLDialect
    depends_on:
      - postgres
    restart: unless-stopped

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: geo_admin
      POSTGRES_PASSWORD: geo_password
      POSTGRES_DB: geo_db
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres-data:
